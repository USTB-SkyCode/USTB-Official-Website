name: Trigger Dokploy Compose Redeploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dokploy-compose-redeploy
  cancel-in-progress: true

jobs:
  redeploy:
    runs-on: ubuntu-latest
    env:
      DOKPLOY_REDEPLOY_HOOK_URL: ${{ secrets.DOKPLOY_REDEPLOY_HOOK_URL }}
    steps:
      - name: Skip when redeploy hook secret is missing
        if: ${{ env.DOKPLOY_REDEPLOY_HOOK_URL == '' }}
        run: echo "DOKPLOY_REDEPLOY_HOOK_URL is not set; skipping redeploy trigger."

      - name: Trigger Dokploy redeploy hook
        if: ${{ env.DOKPLOY_REDEPLOY_HOOK_URL != '' }}
        run: |
          http_code="$(curl --show-error --silent --location \
            --output dokploy-response.json \
            --write-out '%{http_code}' \
            -X POST "$DOKPLOY_REDEPLOY_HOOK_URL")"
          cat dokploy-response.json

          if [ "$http_code" -ge 400 ]; then
            echo "::error::Dokploy redeploy hook returned HTTP $http_code"
            exit 1
          fi

          if grep -q '"message":"Branch Not Match"' dokploy-response.json; then
            echo "::error::Dokploy rejected the webhook with Branch Not Match. Verify that DOKPLOY_REDEPLOY_HOOK_URL is the Compose app Deploy Webhook and that the Dokploy source branch is set to main."
            exit 1
          fi